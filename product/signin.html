<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in – Cherrytree</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@200;300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F6F3EE; --bg-2: #F0EDE8; --bg-3: #E3DFD8;
      --ink: #1a1a1a; --muted: #6b6560; --faint: #aaa49c;
      --green: #4B7263; --green-bg: #eaf1ee;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .grain-svg {
      position: fixed; inset: 0; width: 100vw; height: 100vh;
      z-index: 9999; pointer-events: none; opacity: 0.038;
    }

    .card {
      width: 100%; max-width: 400px;
      animation: fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);} }

    .brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 44px;
      justify-content: center;
    }
    .brand img { width: 26px; height: 26px; object-fit: contain; }
    .brand-name { font-family:'Instrument Serif',serif; font-size:18px; color:var(--ink); }

    h1 {
      font-family:'Instrument Serif',serif;
      font-size: 34px; font-weight: 400; letter-spacing: -0.8px;
      text-align: center; margin-bottom: 6px;
    }
    h1 em { font-style: italic; }
    .subtitle {
      font-size: 14px; font-weight: 300; color: var(--muted);
      text-align: center; margin-bottom: 36px;
    }

    .form { display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); }
    .field input {
      width: 100%; padding: 12px 14px;
      background: #fff; border: 1px solid var(--bg-3);
      border-radius: 10px; font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 300; color: var(--ink);
      outline: none; transition: border-color 0.18s, box-shadow 0.18s;
    }
    .field input::placeholder { color: var(--faint); }
    .field input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(26,26,26,0.06); }

    .field-row { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
    .field-row label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); }
    .forgot { font-size: 12px; font-weight: 300; color: var(--muted); text-decoration: none; }
    .forgot:hover { color: var(--ink); }

    .btn-signin {
      width: 100%; padding: 13px;
      background: var(--ink); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 400;
      cursor: pointer; margin-top: 6px;
      transition: background 0.15s, transform 0.12s;
      position: relative; overflow: hidden;
    }
    .btn-signin:hover { background: #2d2a22; }
    .btn-signin:active { transform: scale(0.985); }
    .btn-signin.loading { pointer-events: none; }
    .btn-signin.loading span { opacity: 0; }
    .btn-signin .spinner {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
    }
    .btn-signin.loading .spinner { display: flex; }
    .spinner-ring {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 4px 0; color: var(--faint); font-size: 11px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--bg-3);
    }

    .signup-row {
      text-align: center; margin-top: 28px;
      font-size: 13px; font-weight: 300; color: var(--muted);
    }
    .signup-row a { color: var(--ink); font-weight: 400; text-decoration: none; }
    .signup-row a:hover { text-decoration: underline; }

    /* Page-out overlay */
    .page-out {
      position: fixed; inset: 0; background: var(--bg);
      z-index: 9998; opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .page-out.active { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

<div class="page-out" id="page-out"></div>

<div class="card">
  <a class="brand" href="../marketing/marketing4.html">
    <img src="../cherries.png" alt="Cherrytree" />
    <span class="brand-name">Cherrytree</span>
  </a>

  <h1>Welcome <em>back.</em></h1>
  <p class="subtitle">Sign in to continue building your agreement.</p>

  <form class="form" id="signin-form" novalidate>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@startup.co" autocomplete="email" />
    </div>

    <div class="field">
      <div class="field-row">
        <label>Password</label>
        <a class="forgot" href="#">Forgot password?</a>
      </div>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-signin" type="submit" id="signin-btn">
      <span>Sign in</span>
      <div class="spinner"><div class="spinner-ring"></div></div>
    </button>
  </form>

  <p class="signup-row">New to Cherrytree? <a href="signup.html">Get started</a></p>
</div>

<svg class="grain-svg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <filter id="grain-filter">
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain-filter)"/>
</svg>

<script>
  document.getElementById('signin-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const btn = document.getElementById('signin-btn');
    btn.classList.add('loading');

    setTimeout(() => {
      const out = document.getElementById('page-out');
      out.classList.add('active');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 380);
    }, 820);
  });
</script>
</body>
</html>
